name: Windows Hardware Info

on: workflow_dispatch

jobs:
  hardware:
    runs-on: windows-latest
    steps:
      - name: CPU Info
        shell: pwsh
        run: |
          $cpu = Get-CimInstance -ClassName Win32_Processor
          Write-Host "=== CPU ==="
          Write-Host "Model: $($cpu.Name)"
          Write-Host "Cores: $($cpu.NumberOfCores)"
          Write-Host "Threads: $($cpu.NumberOfLogicalProcessors)"
          Write-Host "Max Clock: $($cpu.MaxClockSpeed) MHz"
      
      - name: RAM Info
        shell: pwsh
        run: |
          $os = Get-CimInstance -ClassName Win32_OperatingSystem
          $total = [math]::Round($os.TotalVisibleMemorySize / 1MB, 2)
          $free = [math]::Round($os.FreePhysicalMemory / 1MB, 2)
          $used = $total - $free
          Write-Host "=== RAM ==="
          Write-Host "Total: $total GB"
          Write-Host "Used: $used GB"
          Write-Host "Free: $free GB"
      
      - name: Disk Info
        shell: pwsh
        run: |
          Write-Host "=== Disks ==="
          Get-PSDrive -Name C, D -ErrorAction SilentlyContinue | Where-Object { $_.Used -ne $null } | Format-Table Name, @{Name="Size(GB)";Expression={[math]::Round($_.Used/1GB + $_.Free/1GB, 2)}}, @{Name="Used(GB)";Expression={[math]::Round($_.Used/1GB, 2)}}, @{Name="Free(GB)";Expression={[math]::Round($_.Free/1GB, 2)}}, @{Name="Free(%)";Expression={[math]::Round($_.Free/($_.Used+$_.Free)*100, 2)}}
